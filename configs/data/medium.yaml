dataset_src: synthetic_data.SyntheticEpisodeDataset
episode_dataset: true

num_workers: 0
pin_memory: false
persistent_workers: false
train_shuffle: true
val_shuffle: false
test_shuffle: false

dataset_kwargs:
  # ICI-like episodic pretraining: donors share a heterogeneous immune
  # background, while a weak continuous response changes composition/state.
  episodes_per_epoch: 4096
  seed: null
  generation_device: cuda
  difficulty_curriculum_episodes: 0
  # Stationary mixture from the first epoch: clear, medium, and weak effects
  # are sampled continuously without changing difficulty over training time.
  effect_scale_start: [0.9, 2.1]
  effect_scale_end: [0.9, 2.1]

  num_bags: [60, 100]
  # ICI has 1.2k-6.3k cells/donor. This range captures stable bag statistics
  # while keeping online generation affordable on eight GPUs.
  num_cells: [500, 1000]
  latent_dim: 32
  output_dim: 512
  mlp_hidden_dim: 96
  mlp_num_layers: 3
  class_separation: [0.5, 1.4]
  latent_scale: [0.6, 1.3]

  shared_component_probability: 1.0
  num_shared_components: [4, 10]
  shared_component_fraction: [0.82, 0.96]
  donor_shift_scale: 0.35
  donor_component_shift_scale: 0.12
  donor_mixture_logit_scale: 0.65
  shared_component_base_logit_scale: 0.70
  donor_shared_component_logit_scale: 0.70

  continuous_response_probability: 1.0
  response_score_scale: 0.80
  response_score_min_margin: 0.08
  response_mixture_effect_scale: 1.40
  response_state_effect_scale: [0.45, 1.00]
  # composition, state, covariance, interaction, combined
  response_task_probabilities: [0.40, 0.30, 0.05, 0.05, 0.20]
  response_covariance_effect_scale: [0.30, 0.80]
  rare_response_probability: 0.15
  rare_response_fraction: [0.02, 0.08]

  observation_noise: 0.01
  normalize_output: true
  output_norm_eps: 1.0e-8
  # Independent labels prevent class-count completion shortcuts.
  balanced: false

val_dataset_kwargs:
  episodes_per_epoch: 104
  seed: 50042

test_dataset_kwargs:
  episodes_per_epoch: 104
  seed: 60042
