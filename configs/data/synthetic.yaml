dataset_src: synthetic_data.SyntheticEpisodeDataset
episode_dataset: true

# CUDA tensors are generated by each DDP rank's main process.
num_workers: 0
pin_memory: false
persistent_workers: false

train_shuffle: true
val_shuffle: false
test_shuffle: false

dataset_kwargs:
  # DDP splits these episodes across eight ranks: 5000 / 8 = 625 steps.
  # Keeping the global episode count fixed makes the extra GPUs reduce the
  # wall-clock optimizer steps per epoch instead of increasing epoch size.
  episodes_per_epoch: 5000
  seed: null
  generation_device: cuda
  # Train and validation use the same stationary hard distribution from epoch 0.
  # This makes the direction of train loss directly interpretable.
  difficulty_curriculum_episodes: 0
  effect_scale_start: [0.25, 0.9]
  effect_scale_end: [0.25, 0.9]
  # Vary the number of donors/bags across episodes while keeping each DDP
  # step's tensor shape synchronized across ranks.
  num_bags: [50, 100]
  # Sample one shared cell count per episode. Every bag in that episode has the
  # same shape, while different episodes cover varying acquisition depths.
  num_cells: [500, 1000]
  # ICI scConcept embeddings have roughly 37 principal axes at 90% variance;
  # a 32-D latent manifold is substantially closer than the previous 8-D one.
  latent_dim: 32
  output_dim: 512
  mlp_hidden_dim: 128
  mlp_num_layers: 3
  class_separation: [0.5, 2.0]
  latent_scale: [0.5, 1.5]
  # Most episodes contain several background cell-state distributions.
  # Always use the shared-background continuous-response task. The previous
  # easy two-distribution episode path is disabled.
  shared_component_probability: 1.0
  num_shared_components: [1, 9]
  # Background components together occupy 70-90% before donor variation.
  shared_component_fraction: [0.7, 0.9]
  # Label-independent donor heterogeneity around episode-level prototypes.
  donor_shift_scale: 0.45
  donor_component_shift_scale: 0.15
  donor_mixture_logit_scale: 0.5
  # The remaining common response component changes continuously per donor.
  # Its signed score controls both abundance and latent state; score < 0 is
  # label 0 and score > 0 is label 1. There are no fixed X/Y class prototypes.
  continuous_response_probability: 1.0
  response_score_scale: 1.0
  response_score_min_margin: 0.05
  response_mixture_effect_scale: 0.5
  response_state_effect_scale: [0.1, 0.5]
  # Per-episode weights: composition, state, covariance, cell-type interaction,
  # and the combined composition+state+covariance task.
  response_task_probabilities: [0.25, 0.20, 0.15, 0.20, 0.20]
  # Signed response scores continuously contract/expand variance along a
  # random episode-specific latent direction.
  response_covariance_effect_scale: [0.1, 0.4]
  # In 40% of episodes the response population starts at only 1-8%.
  rare_response_probability: 0.4
  rare_response_fraction: [0.01, 0.08]
  observation_noise: 0.01
  # ICI scConcept cells are unit-L2 embeddings. Match that geometry after all
  # biological effects and observation noise have been applied.
  normalize_output: true
  output_norm_eps: 1.0e-8
  # Sample every bag label independently from Bernoulli(0.5), so context class
  # counts do not predict a masked target and 25/25 balance is not forced.
  balanced: false

val_dataset_kwargs:
  # A multiple of 8 prevents DistributedSampler from padding duplicate episodes.
  episodes_per_epoch: 104
  seed: 10042

test_dataset_kwargs:
  episodes_per_epoch: 104
  seed: 20042
