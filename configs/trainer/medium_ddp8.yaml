# 4,096 global episodes/epoch × 100 = 409,600 non-replayed episodes and
# 51,200 DDP optimizer updates. This already exceeds the observed convergence
# horizon; increasing epochs would not compensate for structural failure.
max_epochs: 100
accelerator: gpu
devices: 8
strategy: ddp_find_unused_parameters_false
# BF16 keeps FP32-like exponent range and avoids FP16 GradScaler collapse.
precision: bf16-mixed
log_every_n_steps: 100
check_val_every_n_epoch: 1
num_sanity_val_steps: 0
gradient_clip_val: 1.0
gradient_clip_algorithm: norm
